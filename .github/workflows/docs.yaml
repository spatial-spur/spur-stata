name: Trigger Project Docs Rebuild

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  trigger-project-site:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger spatial-spur.github.io rebuild
        env:
          PAGES_TRIGGER_TOKEN: ${{ secrets.PAGES_TRIGGER_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -z "$PAGES_TRIGGER_TOKEN" ]; then
            echo "Missing PAGES_TRIGGER_TOKEN secret."
            exit 1
          fi

          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${PAGES_TRIGGER_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/spatial-spur/spatial-spur.github.io/actions/workflows/deploy.yml/dispatches \
            -d @- <<EOF
          {
            "ref": "main",
            "inputs": {
              "source_repo": "spatial-spur/spur-stata",
              "source_ref": "${RELEASE_TAG}",
              "source_slug": "spur-stata"
            }
          }
          EOF
